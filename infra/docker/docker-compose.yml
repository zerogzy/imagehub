version: "3.8"

services:
  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: imagehub-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: imagehub
      MYSQL_USER: imagehub
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-imagehub_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imagehub

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: imagehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-imagehub_redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-imagehub_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imagehub

  # ---- Meilisearch ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: imagehub-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-imagehub_meili_secret}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    networks:
      - imagehub

  # ---- API (NestJS) ----
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: imagehub-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      DATABASE_URL: mysql://imagehub:${MYSQL_PASSWORD:-imagehub_secret}@mysql:3306/imagehub
      MIGRATION_DATABASE_URL: mysql://imagehub:${MYSQL_PASSWORD:-imagehub_secret}@mysql:3306/imagehub
      AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-imagehub_redis_secret}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-imagehub_meili_secret}
      STORAGE_ROOT: /app/storage
      DOWNLOAD_TEMP_EXPIRE_MINUTES: ${DOWNLOAD_TEMP_EXPIRE_MINUTES:-5}
    volumes:
      - ../../storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imagehub

  # ---- Web (Next.js) ----
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: imagehub-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
    depends_on:
      - api
    networks:
      - imagehub

  # ---- AI Worker (Python) ----
  worker-ai:
    build:
      context: ../../apps/worker-ai
      dockerfile: Dockerfile
    container_name: imagehub-worker-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_URL: http://api:3001/api/v1
      STORAGE_ROOT: /app/storage
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    volumes:
      - ../../storage:/app/storage
    depends_on:
      - api
    networks:
      - imagehub

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:alpine
    container_name: imagehub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx-full.conf:/etc/nginx/nginx.conf:ro
      - ../../storage:/app/storage:ro
    depends_on:
      - api
      - web
    networks:
      - imagehub

volumes:
  mysql_data:
  redis_data:
  meili_data:

networks:
  imagehub:
    driver: bridge
