upstream imagehub_api {
    server api:3001;
}

upstream imagehub_web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment in production)
    # return 301 https://$host$request_uri;

    # Max upload size
    client_max_body_size 200M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy
    location /api/ {
        proxy_pass http://imagehub_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (batch download, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Rate limiting (applied per IP)
        limit_req zone=api burst=20 nodelay;
    }

    # Static storage files (direct serve for performance)
    location /storage/ {
        alias /app/storage/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Only serve derivative files via nginx directly
        # Original files should go through the API for auth
        location /storage/preview/ {
            alias /app/storage/preview/;
        }
        location /storage/video/ {
            alias /app/storage/video/;
        }
        location /storage/audio/ {
            alias /app/storage/audio/;
        }
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://imagehub_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Rate limiting zones
# This goes in http block; for docker, use a separate conf
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
